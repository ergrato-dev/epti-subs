services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: epti
      POSTGRES_PASSWORD: epti_dev
      POSTGRES_DB: epti_subs
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U epti -d epti_subs"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: . # root del monorepo — contiene pnpm-lock.yaml
      dockerfile: api/Dockerfile
      target: builder # usa la stage de build para hot-reload con tsx
    working_dir: /app/api
    command: pnpm dev
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DATABASE_URL: postgres://epti:epti_dev@db:5432/epti_subs
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      CORS_ORIGIN: http://localhost:8081
    env_file:
      - ./api/.env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./api/src:/app/api/src # hot-reload: cambios en src se reflejan al instante
      - ./api/tsconfig.json:/app/api/tsconfig.json

volumes:
  postgres_data:
