name: Build & Push API image

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - '.github/workflows/api-docker.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./api
          target: production
          push: true
          tags: |
            ghcr.io/ergrato-dev/epti-subs-api:latest
            ghcr.io/ergrato-dev/epti-subs-api:${{ github.sha }}
